spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:catapi}
    username: ${DB_USERNAME:catapi}
    password: ${DB_PASSWORD:catapi123}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false

catapi:
  api:
    base-url: https://api.thecatapi.com/v1
    key: ${CAT_API_KEY:DEMO-API-KEY}
    connect-timeout: 5000
    read-timeout: 10000
  ingestion:
    images-per-breed: 3
    category-images-limit: 3
    max-concurrent-requests: 5

resilience4j:
  retry:
    instances:
      catApi:
        max-attempts: 5
        wait-duration: 3s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpClientErrorException$TooManyRequests

cloud:
  aws:
    region:
      static: us-east-1
    endpoint: http://${LOCALSTACK_HOST:localstack}:4566
    credentials:
      access-key: test
      secret-key: test

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always